{% extends "base.html" %}

{% block title %}Product Detail | NexusTech{% endblock %}

{% block content %}
<div
    style="max-width: 1000px; margin: 0 auto; background: var(--card-bg); border-radius: 16px; border: 1px solid var(--card-border); overflow: hidden; display: flex; flex-wrap: wrap;">
    <div style="flex: 1; min-width: 300px;">
        <img src="{{ product.image_url }}" alt="{{ product.name }}"
            style="width: 100%; height: 100%; object-fit: cover; min-height: 400px;">
    </div>
    <div style="flex: 1; min-width: 300px; padding: 3rem;">
        <h1 style="font-size: 2.5rem; margin-bottom: 1rem;">{{ product.name }}</h1>
        <div class="product-price" style="font-size: 2rem;">{{ "%.2f"|format(product.price) }}</div>

        <p style="color: var(--text-secondary); font-size: 1.1rem; line-height: 1.6; margin: 2rem 0;">
            {{ product.description }}
        </p>

        <hr style="border-color: var(--card-border); margin: 2rem 0;">

        <form action="{{ url_for('add_to_cart', product_id=product.id) }}" method="POST">
            <button type="submit" class="btn" style="font-size: 1.25rem; padding: 1rem;">Add to Cart</button>
        </form>
    </div>
</div>
{% endblock %}
