{% extends "base.html" %}

{% block title %}Checkout | Javee Mart{% endblock %}

{% block content %}
<div class="page-header">
    <h1>Secure Checkout</h1>
    <p>Please enter your shipping details to complete the order.</p>
</div>

<div class="auth-container" style="max-width: 600px;">
    <form action="{{ url_for('process_order') }}" method="POST">

        <h3 style="margin-bottom: 1.5rem; border-bottom: 1px solid var(--card-border); padding-bottom: 0.5rem;">Shipping
            Address</h3>

        <div class="form-group">
            <label for="fullname">Full Name</label>
            <input type="text" id="fullname" name="fullname" required placeholder="John Doe">
        </div>

        <div class="form-group">
            <label for="address">Street Address</label>
            <input type="text" id="address" name="address" required placeholder="123 Main Street, Apt 4B">
        </div>

        <div style="display: flex; gap: 1rem;">
            <div class="form-group" style="flex: 2;">
                <label for="city">City</label>
                <input type="text" id="city" name="city" required placeholder="Mumbai">
            </div>
            <div class="form-group" style="flex: 1;">
                <label for="pincode">Pincode</label>
                <input type="text" id="pincode" name="pincode" required placeholder="400001">
            </div>
        </div>

        <div class="form-group">
            <label for="phone">Phone Number</label>
            <input type="tel" id="phone" name="phone" required placeholder="+91 98765 43210">
        </div>

        <h3 style="margin: 2rem 0 1.5rem; border-bottom: 1px solid var(--card-border); padding-bottom: 0.5rem;">Payment
            Method</h3>
        <p style="color: var(--text-secondary); margin-bottom: 1.5rem; font-size: 0.9rem;">
            💳 Cash on Delivery (COD) is selected by default for this demo.
        </p>

        <button type="submit" class="btn" style="font-size: 1.25rem;">Place Order Now</button>
    </form>
</div>
{% endblock %}
